openapi: 3.0.3

info:
  title: Food Rescue Platform API
  version: 0.0.1-SNAPSHOT
  description: |
    REST API for the Food Rescue Platform.

servers:
  - url: http://localhost:8080

tags:
  - name: User
    description: User management endpoints
  - name: Business
    description: Business management endpoints for authenticated users

paths:
  /users:
    post:
      tags:
        - User
      summary: Create a user
      description: |
        Creates a new user in the local database.

      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: User creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              adminUser:
                summary: Admin user
                value:
                  firstName: Admin
                  lastName: User
                  email: admin@posam.sk
                  password: admin123
                  role: ADMIN
              regularUser:
                summary: Regular user
                value:
                  firstName: Jana
                  lastName: Novakova
                  email: jana.novakova@posam.sk
                  password: user123
                  role: USER
      responses:
        '201':
          description: User created successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: FORBIDDEN
                    message: Access denied
                    details:
                      - Insufficient permissions
                    timestamp: 2025-04-08T18:30:00Z
                    path: /users
        '409':
          description: A user with the same email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateUser:
                  value:
                    code: CONFLICT
                    message: User with email=jana.novakova@posam.sk already exists
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /users
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /businesses:
    post:
      tags:
        - Business
      summary: Create a business
      description: |
        Creates a new business.

      operationId: createBusiness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Business creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessRequest'
            examples:
              businessCreate:
                summary: New business
                value:
                  name: Bistro Dobré Jedlo
                  description: Vegetarian rescue meals
                  address:
                    street: Hlavna 1
                    city: Kosice
                    postalCode: 04001
                    country: Slovakia
      responses:
        '201':
          description: Business created successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is blocked or not allowed to create a business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                blockedUser:
                  value:
                    code: FORBIDDEN
                    message: Access denied
                    details:
                      - Insufficient permissions
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses
        '409':
          description: A business with the same name already exists for the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateBusiness:
                  value:
                    code: CONFLICT
                    message: Business with the same name already exists for this owner
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /businesses/{id}:
    get:
      tags:
        - Business
      summary: Get business by id
      description: |
        Returns a business by id.

      operationId: getBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      responses:
        '200':
          description: Business found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessResponse'
              examples:
                businessFound:
                  value:
                    id: 10
                    ownerId: 2
                    name: Bistro Dobré Jedlo
                    description: Vegetarian rescue meals
                    status: PENDING
                    address:
                      street: Hlavna 1
                      city: Kosice
                      postalCode: 04001
                      country: Slovakia
                    createdAt: 2025-04-08T18:30:00Z
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to access this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenBusiness:
                  value:
                    code: FORBIDDEN
                    message: You do not have access to business with id=10
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                businessNotFound:
                  value:
                    code: NOT_FOUND
                    message: Business with id=10 was not found
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    put:
      tags:
        - Business
      summary: Update business
      description: |
        Updates a business owned by the authenticated user.

      operationId: updateBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      requestBody:
        required: true
        description: Business update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessRequest'
            examples:
              businessUpdate:
                summary: Updated business
                value:
                  name: Updated Bistro Dobré Jedlo
                  description: Updated vegetarian rescue meals
                  address:
                    street: Hlavna 12
                    city: Kosice
                    postalCode: 04001
                    country: Slovakia
      responses:
        '200':
          description: Business updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to update this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenUpdate:
                  value:
                    code: FORBIDDEN
                    message: You do not have access to business with id=10
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A business with the same name already exists for the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateBusinessOnUpdate:
                  value:
                    code: CONFLICT
                    message: Business with the same name already exists for this owner
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    delete:
      tags:
        - Business
      summary: Delete business
      description: |
        Deletes a business.

      operationId: deleteBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      responses:
        '204':
          description: Business deleted successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to delete this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenDelete:
                  value:
                    code: FORBIDDEN
                    message: You do not have access to business with id=10
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BusinessIdPathParam:
      name: id
      in: path
      required: true
      description: Business identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 10

  responses:
    BadRequestResponse:
      description: Invalid request body or request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidBody:
              value:
                code: VALIDATION_ERROR
                message: Invalid request body
                details:
                  - name must not be blank
                timestamp: 2025-04-08T18:30:00Z
                path: /businesses

    UnauthorizedResponse:
      description: Authentication required or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: UNAUTHORIZED
                message: Full authentication is required to access this resource
                details: []
                timestamp: 2025-04-08T18:30:00Z
                path: /businesses

    InternalServerErrorResponse:
      description: Unexpected internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalError:
              value:
                code: INTERNAL_ERROR
                message: Unexpected internal error
                details:
                  - Please contact support
                timestamp: 2025-04-08T18:30:00Z
                path: /businesses

  schemas:
    CreateUserRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - role
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          example: Admin
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          example: User
        email:
          type: string
          format: email
          maxLength: 255
          example: admin@posam.sk
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 255
          example: admin123
        role:
          $ref: '#/components/schemas/UserRole'

    CreateBusinessRequest:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Bistro Dobré Jedlo
        description:
          type: string
          nullable: true
          maxLength: 1000
          example: Vegetarian rescue meals
        address:
          $ref: '#/components/schemas/Address'

    UpdateBusinessRequest:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Updated Bistro Dobré Jedlo
        description:
          type: string
          nullable: true
          maxLength: 1000
          example: Updated vegetarian rescue meals
        address:
          $ref: '#/components/schemas/Address'

    BusinessResponse:
      type: object
      required:
        - id
        - ownerId
        - name
        - status
        - address
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          example: 10
        ownerId:
          type: integer
          format: int64
          example: 2
        name:
          type: string
          example: Bistro Dobré Jedlo
        description:
          type: string
          nullable: true
          example: Vegetarian rescue meals
        status:
          $ref: '#/components/schemas/BusinessStatus'
        address:
          $ref: '#/components/schemas/Address'
        createdAt:
          type: string
          format: date-time
          example: 2025-04-08T18:30:00Z

    Address:
      type: object
      required:
        - street
        - city
        - postalCode
        - country
      properties:
        street:
          type: string
          minLength: 1
          maxLength: 255
          example: Hlavna 1
        city:
          type: string
          minLength: 1
          maxLength: 100
          example: Kosice
        postalCode:
          type: string
          minLength: 1
          maxLength: 20
          example: 04001
        country:
          type: string
          minLength: 1
          maxLength: 100
          example: Slovakia

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - details
        - timestamp
        - path
      properties:
        code:
          type: string
          example: CONFLICT
        message:
          type: string
          example: Business with the same name already exists for this owner
        details:
          type: array
          items:
            type: string
          example:
            - Duplicate or invalid database state
        timestamp:
          type: string
          format: date-time
          example: 2025-04-08T18:30:00Z
        path:
          type: string
          example: /businesses

    UserRole:
      type: string
      enum:
        - USER
        - ADMIN

    BusinessStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - BLOCKED
        - REJECTED