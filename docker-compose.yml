name: food-rescue-platform

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fsa
    volumes:
      - food_rescue_db:/var/lib/postgresql/data
    networks:
      - food_rescue_network

  my-keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    restart: unless-stopped
    command: ["start-dev"]
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: info
    networks:
      - food_rescue_network

volumes:
  food_rescue_db:
    driver: local

networks:
  food_rescue_network:
    driver: bridge
