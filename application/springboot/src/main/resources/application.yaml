spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/fsa
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    name: fsa-db
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    mapping-resources:
      - META-INF/orm.xml
    properties:
      hibernate:
        format_sql: false
  liquibase:
    change-log: classpath:persistence/db/changelog/changelog-master.xml

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"

food-rescue:
  offer-assistant:
    provider: ${FOOD_RESCUE_OFFER_ASSISTANT_PROVIDER:${FOOD_RESCUE_SUPPORT_PROVIDER:stub}}
    openai:
      responses-base-url: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_RESPONSES_BASE_URL:https://api.openai.com/v1/responses}
      images-base-url: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_IMAGES_BASE_URL:https://api.openai.com/v1/images/generations}
      api-key: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_API_KEY:${FOOD_RESCUE_SUPPORT_OPENAI_API_KEY:}}
      project-id: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_PROJECT_ID:${FOOD_RESCUE_SUPPORT_OPENAI_PROJECT_ID:}}
      organization-id: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_ORGANIZATION_ID:${FOOD_RESCUE_SUPPORT_OPENAI_ORGANIZATION_ID:}}
      draft-model: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_DRAFT_MODEL:${FOOD_RESCUE_SUPPORT_OPENAI_MODEL:gpt-4.1-mini}}
      image-model: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_IMAGE_MODEL:gpt-image-1}
      timeout-seconds: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_TIMEOUT_SECONDS:45}
      max-output-tokens: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_MAX_OUTPUT_TOKENS:500}
      temperature: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_TEMPERATURE:0.2}
      image-size: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_IMAGE_SIZE:1024x1024}
      image-quality: ${FOOD_RESCUE_OFFER_ASSISTANT_OPENAI_IMAGE_QUALITY:medium}
  offer-media:
    provider: ${FOOD_RESCUE_OFFER_MEDIA_PROVIDER:filesystem}
    base-dir: ${FOOD_RESCUE_OFFER_MEDIA_BASE_DIR:${java.io.tmpdir}/food-rescue-offer-media}
    azure:
      connection-string: ${FOOD_RESCUE_OFFER_MEDIA_AZURE_CONNECTION_STRING:}
      business-icons-container: ${FOOD_RESCUE_OFFER_MEDIA_AZURE_BUSINESS_ICONS_CONTAINER:business-icons}
      offer-images-container: ${FOOD_RESCUE_OFFER_MEDIA_AZURE_OFFER_IMAGES_CONTAINER:offer-images}
  support:
    provider: ${FOOD_RESCUE_SUPPORT_PROVIDER:stub}
    openai:
      base-url: ${FOOD_RESCUE_SUPPORT_OPENAI_BASE_URL:https://api.openai.com/v1/responses}
      api-key: ${FOOD_RESCUE_SUPPORT_OPENAI_API_KEY:}
      project-id: ${FOOD_RESCUE_SUPPORT_OPENAI_PROJECT_ID:}
      organization-id: ${FOOD_RESCUE_SUPPORT_OPENAI_ORGANIZATION_ID:}
      model: ${FOOD_RESCUE_SUPPORT_OPENAI_MODEL:gpt-4.1-mini}
      timeout-seconds: ${FOOD_RESCUE_SUPPORT_OPENAI_TIMEOUT_SECONDS:30}
      max-output-tokens: ${FOOD_RESCUE_SUPPORT_OPENAI_MAX_OUTPUT_TOKENS:500}
      max-tool-rounds: ${FOOD_RESCUE_SUPPORT_OPENAI_MAX_TOOL_ROUNDS:3}
      temperature: ${FOOD_RESCUE_SUPPORT_OPENAI_TEMPERATURE:0.2}
  identity:
    keycloak:
      base-url: ${FOOD_RESCUE_KEYCLOAK_BASE_URL:http://localhost:8081}
      realm: ${FOOD_RESCUE_KEYCLOAK_REALM:FSA}
      admin-realm: ${FOOD_RESCUE_KEYCLOAK_ADMIN_REALM:master}
      admin-client-id: ${FOOD_RESCUE_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
      admin-username: ${FOOD_RESCUE_KEYCLOAK_ADMIN_USERNAME:admin}
      admin-password: ${FOOD_RESCUE_KEYCLOAK_ADMIN_PASSWORD:admin}
      client-id: ${FOOD_RESCUE_KEYCLOAK_CLIENT_ID:fsa-client}
      client-secret: ${FOOD_RESCUE_KEYCLOAK_CLIENT_SECRET:fsa-client-secret}

---
spring:
  config:
    activate:
      on-profile: keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/FSA
          jwk-set-uri: http://localhost:8081/realms/FSA/protocol/openid-connect/certs
