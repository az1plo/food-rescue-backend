spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/fsa
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    name: fsa-db
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    mapping-resources:
      - META-INF/orm.xml
    properties:
      hibernate:
        format_sql: false
  liquibase:
    change-log: classpath:persistence/db/changelog/changelog-master.xml

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"

food-rescue:
  identity:
    keycloak:
      base-url: ${FOOD_RESCUE_KEYCLOAK_BASE_URL:http://localhost:8081}
      realm: ${FOOD_RESCUE_KEYCLOAK_REALM:FSA}
      admin-realm: ${FOOD_RESCUE_KEYCLOAK_ADMIN_REALM:master}
      admin-client-id: ${FOOD_RESCUE_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
      admin-username: ${FOOD_RESCUE_KEYCLOAK_ADMIN_USERNAME:admin}
      admin-password: ${FOOD_RESCUE_KEYCLOAK_ADMIN_PASSWORD:admin}

---
spring:
  config:
    activate:
      on-profile: keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/FSA
          jwk-set-uri: http://localhost:8081/realms/FSA/protocol/openid-connect/certs
