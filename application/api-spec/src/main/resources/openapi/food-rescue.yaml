openapi: 3.0.3

info:
  title: Savr Platform API
  version: 0.0.1-SNAPSHOT
  description: |
    REST API for the Savr platform.

servers:
  - url: http://localhost:8080

tags:
  - name: Auth
    description: Public authentication token exchange endpoint backed by Keycloak
  - name: User
    description: User management endpoints
  - name: Business
    description: Business management endpoints for authenticated users
  - name: Admin
    description: Administrative moderation endpoints
  - name: Offer
    description: Offer management and browsing endpoints for authenticated users
  - name: Marketplace
    description: Public marketplace endpoints with filters, distance, and business summaries
  - name: OfferAssistant
    description: Authenticated AI helper endpoints used while a business prepares an offer draft
  - name: OfferMedia
    description: Authenticated offer image upload endpoints and public offer image serving
  - name: BusinessMedia
    description: Authenticated business icon upload endpoint and public business icon serving
  - name: Support
    description: AI-ready support chat endpoints used by the floating assistant widget
  - name: Order
    description: Paid order and pickup management endpoints for authenticated users
  - name: Notification
    description: Notification inbox endpoints for authenticated users

paths:
  /auth/token:
    post:
      tags:
        - Auth
      summary: Exchange an authentication token
      description: |
        Exchanges a supported OAuth2/OpenID Connect grant against the backend auth bridge.
        The backend forwards the validated request to Keycloak while keeping client credentials private.

        Supported grant types:
          - `password`
          - `refresh_token`
          - `authorization_code`

        Required form fields depend on `grant_type` and follow the same combinations as the current runtime behavior.
      operationId: exchangeToken
      requestBody:
        required: true
        description: Form-encoded token exchange request
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthTokenExchangeRequest'
            examples:
              passwordGrant:
                summary: Password grant exchange
                value:
                  grant_type: password
                  username: jana.novakova@posam.sk
                  password: user123
                  scope: openid profile email offline_access
              refreshTokenGrant:
                summary: Refresh token exchange
                value:
                  grant_type: refresh_token
                  refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
              authorizationCodeGrant:
                summary: Authorization code exchange
                value:
                  grant_type: authorization_code
                  code: 4f4e0b19-4a2f-4d43-9cc6-8f17f5b5eb6d
                  redirect_uri: http://localhost:4200/auth/callback
                  code_verifier: pkce-code-verifier
                  scope: openid profile email offline_access
      responses:
        '200':
          description: Token exchange completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenExchangeResponse'
              examples:
                success:
                  value:
                    access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
                    expires_in: 300
                    refresh_expires_in: 1800
                    refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
                    token_type: Bearer
                    id_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.id
                    not-before-policy: 0
                    session_state: 3e9f5f8b-2b27-4f1a-8f35-0edfd859f8b6
                    scope: openid profile email offline_access
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'
  /users:
    post:
      tags:
        - User
      summary: Create a user
      description: |
        Creates a new user in Keycloak and in the local database.

      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: User creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              adminUser:
                summary: Admin user
                value:
                  firstName: Admin
                  lastName: User
                  email: admin@posam.sk
                  password: admin123
                  role: ADMIN
              regularUser:
                summary: Regular user
                value:
                  firstName: Jana
                  lastName: Novakova
                  email: jana.novakova@posam.sk
                  password: user123
                  role: USER
      responses:
        '201':
          description: User created successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  value:
                    code: FORBIDDEN
                    message: Access denied
                    details:
                      - Insufficient permissions
                    timestamp: 2025-04-08T18:30:00Z
                    path: /users
        '409':
          description: A user with the same email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateUser:
                  value:
                    code: CONFLICT
                    message: User with email=jana.novakova@posam.sk already exists
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /users
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /users/register:
    post:
      tags:
        - User
      summary: Register a user
      description: |
        Registers a new regular user in Keycloak and in the local database.

      operationId: registerUser
      requestBody:
        required: true
        description: Public user registration payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserRequest'
            examples:
              userRegistration:
                summary: Regular user registration
                value:
                  firstName: Jana
                  lastName: Novakova
                  email: jana.novakova@posam.sk
                  password: user123
      responses:
        '201':
          description: User registered successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '409':
          description: A user with the same email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /businesses:
    get:
      tags:
        - Business
      summary: List businesses of current user
      description: |
        Returns all businesses owned by the authenticated user.

      operationId: getBusinesses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Businesses listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessResponse'
              examples:
                businessesFound:
                  value:
                    - id: 10
                      ownerId: 2
                      name: Bistro DobrÃ© Jedlo
                      description: Vegetarian rescue meals
                      status: PENDING
                      address:
                        street: Hlavna 1
                        city: Kosice
                        postalCode: 04001
                        country: Slovakia
                      createdAt: 2025-04-08T18:30:00Z
                    - id: 11
                      ownerId: 2
                      name: Green Kitchen
                      description: Fresh rescue lunches
                      status: ACTIVE
                      address:
                        street: Mestska 5
                        city: Kosice
                        postalCode: 04001
                        country: Slovakia
                      createdAt: 2025-04-10T10:00:00Z
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    post:
      tags:
        - Business
      summary: Create a business
      description: |
        Creates a new business.

      operationId: createBusiness
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Business creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessRequest'
            examples:
              businessCreate:
                summary: New business
                value:
                  name: Bistro Dobré Jedlo
                  description: Vegetarian rescue meals
                  address:
                    street: Hlavna 1
                    city: Kosice
                    postalCode: 04001
                    country: Slovakia
      responses:
        '201':
          description: Business created successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is blocked or not allowed to create a business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                blockedUser:
                  value:
                    code: FORBIDDEN
                    message: Access denied
                    details:
                      - Insufficient permissions
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses
        '409':
          description: A business with the same name already exists for the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateBusiness:
                  value:
                    code: CONFLICT
                    message: Business with the same name already exists for this owner
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /businesses/{id}:
    get:
      tags:
        - Business
      summary: Get business by id
      description: |
        Returns a business by id.

      operationId: getBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      responses:
        '200':
          description: Business found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessResponse'
              examples:
                businessFound:
                  value:
                    id: 10
                    ownerId: 2
                    name: Bistro Dobré Jedlo
                    description: Vegetarian rescue meals
                    status: PENDING
                    address:
                      street: Hlavna 1
                      city: Kosice
                      postalCode: 04001
                      country: Slovakia
                    createdAt: 2025-04-08T18:30:00Z
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to access this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenBusiness:
                  value:
                    code: FORBIDDEN
                    message: You do not have access to business with id=10
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                businessNotFound:
                  value:
                    code: NOT_FOUND
                    message: Business with id=10 was not found
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    put:
      tags:
        - Business
      summary: Update business
      description: |
        Updates a business owned by the authenticated user.

      operationId: updateBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      requestBody:
        required: true
        description: Business update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessRequest'
            examples:
              businessUpdate:
                summary: Updated business
                value:
                  name: Updated Bistro Dobré Jedlo
                  description: Updated vegetarian rescue meals
                  address:
                    street: Hlavna 12
                    city: Kosice
                    postalCode: 04001
                    country: Slovakia
      responses:
        '200':
          description: Business updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to update this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenUpdate:
                  value:
                    code: FORBIDDEN
                    message: You do not have access to business with id=10
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: A business with the same name already exists for the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicateBusinessOnUpdate:
                  value:
                    code: CONFLICT
                    message: Business with the same name already exists for this owner
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

    delete:
      tags:
        - Business
      summary: Delete business
      description: |
        Deletes a business.

      operationId: deleteBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      responses:
        '204':
          description: Business deleted successfully
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to delete this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenDelete:
                  value:
                    code: FORBIDDEN
                    message: You do not have access to business with id=10
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /businesses/{id}/analytics:
    get:
      tags:
        - Business
      summary: Get business analytics
      description: |
        Returns analytics for a business managed by the authenticated user.

      operationId: getBusinessAnalytics
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      responses:
        '200':
          description: Business analytics returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessAnalyticsResponse'
              examples:
                businessAnalytics:
                  value:
                    businessId: 10
                    businessName: Bistro Dobre Jedlo
                    generatedAt: 2025-04-28T16:30:00Z
                    overview:
                      totalOffers: 18
                      availableOffers: 3
                      offersClaimed: 14
                      activeReservations: 2
                      completedPickups: 10
                      cancelledReservations: 2
                      recoveredRevenue: 49.00
                      pendingReservedRevenue: 9.80
                      offerClaimRate: 77.8
                      pickupSuccessRate: 71.4
                      cancellationRate: 14.3
                      averageHoursToFirstReservation: 4.5
                    catalogStatus:
                      - status: AVAILABLE
                        count: 3
                        share: 16.7
                      - status: RESERVED
                        count: 5
                        share: 27.8
                    dailyActivity:
                      - date: 2025-04-27
                        offersPublished: 2
                        reservationsCreated: 3
                        cancellations: 0
                        pickupsConfirmed: 1
                    daypartPerformance:
                      - slotKey: evening
                        label: Evening
                        offersScheduled: 8
                        offersClaimed: 7
                        pickupsConfirmed: 5
                        recoveredRevenue: 24.50
                        claimRate: 87.5
                        pickupRate: 62.5
                    topItems:
                      - itemName: Croissant
                        offeredQuantity: 22
                        reservedQuantity: 18
                        pickedUpQuantity: 12
                    insights:
                      - tone: success
                        title: Reserved revenue is already in motion
                        message: 9.80 EUR are currently tied to active reservations waiting for pickup.
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to access analytics for this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbiddenAnalytics:
                  value:
                    code: FORBIDDEN
                    message: You are not allowed to view analytics for this business
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10/analytics
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                analyticsBusinessNotFound:
                  value:
                    code: NOT_FOUND
                    message: Business with id=10 was not found
                    details: []
                    timestamp: 2025-04-08T18:30:00Z
                    path: /businesses/10/analytics
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /business-icons:
    post:
      tags:
        - BusinessMedia
      summary: Upload a business icon
      description: |
        Uploads a business icon for a managed business and stores the resulting icon URL on the business profile.

      operationId: uploadBusinessIcon
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Business icon upload payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessIconUploadRequest'
      responses:
        '200':
          description: Business icon uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to update this business icon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /business-icons/{id}:
    get:
      tags:
        - BusinessMedia
      summary: Get a business icon by id
      description: |
        Returns the raw bytes of a previously uploaded business icon.

      operationId: getBusinessIcon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: 4d1d8c3acfab475a99a0d001f7d7b1e2.png
      responses:
        '200':
          description: Business icon returned successfully
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          description: Business icon not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /admin/businesses/pending:
    get:
      tags:
        - Admin
      summary: List pending businesses for approval
      description: |
        Returns businesses waiting for administrative approval.

      operationId: getPendingBusinessesForApproval
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending businesses listed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BusinessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /admin/businesses/{id}/approve:
    post:
      tags:
        - Admin
      summary: Approve a business
      description: |
        Approves a pending business and moves it into the active state.

      operationId: approveBusiness
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPathParam'
      responses:
        '200':
          description: Business approved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: Admin privileges required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /marketplace/offers:
    get:
      tags:
        - Marketplace
      summary: List public marketplace offers
      description: |
        Returns customer-facing offer cards enriched with business information, quantity badges,
        optional distance calculation, and availability filtering for the public marketplace page.

      operationId: getMarketplaceOffers
      parameters:
        - $ref: '#/components/parameters/MarketplaceQueryParam'
        - $ref: '#/components/parameters/MarketplaceViewerLatitudeParam'
        - $ref: '#/components/parameters/MarketplaceViewerLongitudeParam'
        - $ref: '#/components/parameters/MarketplaceRadiusKmParam'
        - $ref: '#/components/parameters/MarketplaceSortParam'
        - $ref: '#/components/parameters/MarketplaceIncludeUnavailableParam'
      responses:
        '200':
          description: Marketplace offers returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MarketplaceOfferResponse'
  /support/chat/messages:
    post:
      tags:
        - Support
      summary: Send a support chat message
      description: |
        Accepts the latest user message together with lightweight conversation context and returns
        an assistant reply. The domain flow is intentionally provider-agnostic so it can later be
        backed by OpenAI or any other model adapter.
      operationId: sendSupportChatMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportChatRequest'
      responses:
        '200':
          description: Support assistant reply returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportChatResponse'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /offer-assistant/draft-from-image:
    post:
      tags:
        - OfferAssistant
      summary: Create an AI offer draft from a food photo
      description: |
        An authenticated business user uploads a food photo payload, and the AI suggests visible items,
        a title, a description, and a category. This endpoint never publishes an offer and it never sets
        price, quantity, pickup window, or confirmed allergens.
      operationId: createOfferDraftFromImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferDraftFromImageRequest'
      responses:
        '200':
          description: Offer draft suggestion created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferDraftSuggestion'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to use AI draft creation for this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /offer-assistant/generate-cover:
    post:
      tags:
        - OfferAssistant
      summary: Generate an illustrative AI cover image
      description: |
        Generates an illustrative-only cover image for a business offer draft. The generated image is not
        published automatically and still has to be selected manually by the business before final offer creation.
      operationId: generateOfferCoverImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferIllustrativeCoverRequest'
      responses:
        '200':
          description: Illustrative cover image generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneratedOfferImage'
        '400':
          $ref: '#/components/responses/BadRequestResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          description: User is not allowed to generate an offer cover for this business
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Business not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerErrorResponse'

  /offer-images:
    post:
      tags:
        - OfferMedia
      summary: Upload a final offer image candidate
      description: |
        Stores a business-selected offer image and returns a reusable image URL. This can be the original
        uploaded food photo, the business's own uploaded image, or an illustrative AI-generated cover chosen
        manually by the business.
      operationId: uploadOfferImage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferImageUploadRequest'
      responses:
        '200':
