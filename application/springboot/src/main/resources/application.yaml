spring:
  datasource:
    url: jdbc:postgresql://localhost:55432/fsa
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    name: fsa-db
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    mapping-resources:
      - META-INF/orm.xml
    properties:
      hibernate:
        format_sql: false
  liquibase:
    change-log: classpath:persistence/db/changelog/changelog-master.xml

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: "*"

food-rescue:
  support:
    provider: ${FOOD_RESCUE_SUPPORT_PROVIDER:stub}
    openai:
      base-url: ${FOOD_RESCUE_SUPPORT_OPENAI_BASE_URL:https://api.openai.com/v1/responses}
      api-key: ${FOOD_RESCUE_SUPPORT_OPENAI_API_KEY:}
      project-id: ${FOOD_RESCUE_SUPPORT_OPENAI_PROJECT_ID:}
      organization-id: ${FOOD_RESCUE_SUPPORT_OPENAI_ORGANIZATION_ID:}
      model: ${FOOD_RESCUE_SUPPORT_OPENAI_MODEL:gpt-4.1-mini}
      timeout-seconds: ${FOOD_RESCUE_SUPPORT_OPENAI_TIMEOUT_SECONDS:30}
      max-output-tokens: ${FOOD_RESCUE_SUPPORT_OPENAI_MAX_OUTPUT_TOKENS:500}
      max-tool-rounds: ${FOOD_RESCUE_SUPPORT_OPENAI_MAX_TOOL_ROUNDS:3}
      temperature: ${FOOD_RESCUE_SUPPORT_OPENAI_TEMPERATURE:0.2}
  identity:
    keycloak:
      base-url: ${FOOD_RESCUE_KEYCLOAK_BASE_URL:http://localhost:8081}
      realm: ${FOOD_RESCUE_KEYCLOAK_REALM:FSA}
      admin-realm: ${FOOD_RESCUE_KEYCLOAK_ADMIN_REALM:master}
      admin-client-id: ${FOOD_RESCUE_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
      admin-username: ${FOOD_RESCUE_KEYCLOAK_ADMIN_USERNAME:admin}
      admin-password: ${FOOD_RESCUE_KEYCLOAK_ADMIN_PASSWORD:admin}
      client-id: ${FOOD_RESCUE_KEYCLOAK_CLIENT_ID:fsa-client}
      client-secret: ${FOOD_RESCUE_KEYCLOAK_CLIENT_SECRET:fsa-client-secret}

---
spring:
  config:
    activate:
      on-profile: keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/FSA
          jwk-set-uri: http://localhost:8081/realms/FSA/protocol/openid-connect/certs
