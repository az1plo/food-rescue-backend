components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BusinessIdPathParam:
      name: id
      in: path
      required: true
      description: Business identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 10

    BusinessIdQueryParam:
      name: businessId
      in: query
      required: false
      description: Optional business identifier used to filter resources of a managed business
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 10

    MarketplaceQueryParam:
      name: q
      in: query
      required: false
      description: Free-text search against offer, business, and address fields
      schema:
        type: string
        maxLength: 120
      example: bakery

    MarketplaceViewerLatitudeParam:
      name: viewerLat
      in: query
      required: false
      description: Optional viewer latitude used to calculate distance from the user's location
      schema:
        type: number
        format: double
        minimum: -90
        maximum: 90
      example: 48.7205

    MarketplaceViewerLongitudeParam:
      name: viewerLng
      in: query
      required: false
      description: Optional viewer longitude used to calculate distance from the user's location
      schema:
        type: number
        format: double
        minimum: -180
        maximum: 180
      example: 21.2578

    MarketplaceRadiusKmParam:
      name: radiusKm
      in: query
      required: false
      description: Optional radius in kilometers used to limit offers around the viewer's location
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 30

    MarketplaceSortParam:
      name: sort
      in: query
      required: false
      description: Marketplace sort order
      schema:
        $ref: '#/components/schemas/MarketplaceOfferSort'
      example: DISTANCE

    MarketplaceIncludeUnavailableParam:
      name: includeUnavailable
      in: query
      required: false
      description: Include sold-out or expired offers in the public marketplace
      schema:
        type: boolean
        default: false
      example: false

    OfferIdPathParam:
      name: id
      in: path
      required: true
      description: Offer identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 100

    OrderIdPathParam:
      name: id
      in: path
      required: true
      description: Order identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 500

    NotificationIdPathParam:
      name: id
      in: path
      required: true
      description: Notification identifier
      schema:
        type: integer
        format: int64
        minimum: 1
      example: 900

  responses:
    BadRequestResponse:
      description: Invalid request body or request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidBody:
              value:
                code: VALIDATION_ERROR
                message: Invalid request body
                details:
                  - name must not be blank
                timestamp: 2025-04-08T18:30:00Z
                path: /businesses

    UnauthorizedResponse:
      description: Authentication required or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: UNAUTHORIZED
                message: Full authentication is required to access this resource
                details: []
                timestamp: 2025-04-08T18:30:00Z
                path: /businesses

    InternalServerErrorResponse:
      description: Unexpected internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalError:
              value:
                code: INTERNAL_ERROR
                message: Unexpected internal error
                details:
                  - Please contact support
                timestamp: 2025-04-08T18:30:00Z
                path: /businesses

  schemas:
    AuthTokenExchangeRequest:
      type: object
      required:
        - grant_type
      properties:
        grant_type:
          type: string
          enum:
            - password
            - refresh_token
            - authorization_code
          example: authorization_code
        username:
          type: string
          nullable: true
          description: Required when grant_type is `password`
          example: jana.novakova@posam.sk
        password:
          type: string
          format: password
          nullable: true
          description: Required when grant_type is `password`
          example: user123
        refresh_token:
          type: string
          nullable: true
          description: Required when grant_type is `refresh_token`
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
        code:
          type: string
          nullable: true
          description: Required when grant_type is `authorization_code`
          example: 4f4e0b19-4a2f-4d43-9cc6-8f17f5b5eb6d
        redirect_uri:
          type: string
          nullable: true
          description: Required when grant_type is `authorization_code`
          example: http://localhost:4200/auth/callback
        code_verifier:
          type: string
          nullable: true
          description: Optional PKCE verifier for authorization code flow
          example: pkce-code-verifier
        scope:
          type: string
          nullable: true
          description: Optional scope override. Defaults to `openid profile email offline_access`.
          example: openid profile email offline_access

    AuthTokenExchangeResponse:
      type: object
      additionalProperties: true
      required:
        - access_token
        - expires_in
        - refresh_expires_in
        - refresh_token
        - token_type
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access
        expires_in:
          type: integer
          example: 300
        refresh_expires_in:
          type: integer
          example: 1800
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh
        token_type:
          type: string
          example: Bearer
        id_token:
          type: string
          nullable: true
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.id
        not-before-policy:
          type: integer
          nullable: true
          example: 0
        session_state:
          type: string
          nullable: true
          example: 3e9f5f8b-2b27-4f1a-8f35-0edfd859f8b6
        scope:
          type: string
          nullable: true
          example: openid profile email offline_access

    CreateUserRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - role
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          example: Admin
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          example: User
        email:
          type: string
          format: email
          maxLength: 255
          example: admin@posam.sk
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 255
          example: admin123
        role:
          $ref: '#/components/schemas/UserRole'

    RegisterUserRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          example: Jana
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          example: Novakova
        email:
          type: string
          format: email
          maxLength: 255
          example: jana.novakova@posam.sk
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 255
          example: user123

    CreateBusinessRequest:
      type: object
      required:
        - name
        - address
      properties:
        name:
