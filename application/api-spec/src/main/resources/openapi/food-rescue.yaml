    ErrorResponse:
      type: object
      required:
        - code
        - message
        - details
        - timestamp
        - path
      properties:
        code:
          type: string
          example: CONFLICT
        message:
          type: string
          example: Business with the same name already exists for this owner
        details:
          type: array
          items:
            type: string
          example:
            - Duplicate or invalid database state
        timestamp:
          type: string
          format: date-time
          example: 2025-04-08T18:30:00Z
        path:
          type: string
          example: /businesses

    UserRole:
      type: string
      enum:
        - USER
        - ADMIN

    BusinessStatus:
      type: string
      enum:
        - PENDING
        - ACTIVE
        - BLOCKED
        - REJECTED

    OfferStatus:
      type: string
      enum:
        - DRAFT
        - AVAILABLE
        - RESERVED
        - PICKED_UP
        - SOLD_OUT
        - EXPIRED
        - CANCELLED

    OfferCategory:
      type: string
      enum:
        - BAKERY
        - READY_MEAL
        - PRODUCE
        - GROCERY
        - DESSERT
        - BEVERAGE
        - MIXED
        - OTHER

    AllergenCode:
      type: string
      enum:
        - GLUTEN
        - CRUSTACEANS
        - EGGS
        - FISH
        - PEANUTS
        - SOYBEANS
        - MILK
        - TREE_NUTS
        - CELERY
        - MUSTARD
        - SESAME
        - SULPHUR_DIOXIDE_AND_SULPHITES
        - LUPIN
        - MOLLUSCS
        - OTHER
        - UNKNOWN

    OfferDraftFromImageRequest:
      type: object
      required:
        - businessId
        - fileName
        - contentType
        - imageBase64
      properties:
        businessId:
          type: integer
          format: int64
          minimum: 1
        fileName:
          type: string
          maxLength: 255
          example: food-photo.jpg
        contentType:
          type: string
          maxLength: 100
          example: image/jpeg
        imageBase64:
          type: string
          minLength: 1
          example: iVBORw0KGgoAAAANSUhEUgAA...

    OfferDraftSuggestion:
      type: object
      required:
        - detectedItems
        - suggestedTitle
        - suggestedCategory
      properties:
        detectedItems:
          description: Sellable detected offer items only. Prepared dishes must be grouped into one item, while separate visible products may use approximate counts like `Croissant x3`. Individual ingredients must not be returned as separate items.
          type: array
          items:
            type: string
            maxLength: 80
          example:
            - Croissant x3
            - Baguette x1
            - Pastry x2
        suggestedTitle:
          type: string
          example: Evening bakery rescue bag
        suggestedDescription:
          type: string
          nullable: true
          example: A mix of visible pastries and bread from today's late-afternoon bakery selection.
        suggestedCategory:
          $ref: '#/components/schemas/OfferCategory'

    OfferIllustrativeCoverRequest:
      type: object
      required:
        - businessId
        - title
      properties:
        businessId:
          type: integer
          format: int64
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 160
        description:
          type: string
          nullable: true
          maxLength: 1000
        category:
          $ref: '#/components/schemas/OfferCategory'
        detectedItems:
          description: Optional sellable detected items used only as context for illustrative image generation.
          type: array
          items:
            type: string

    GeneratedOfferImage:
      type: object
      required:
        - fileName
        - contentType
        - imageBase64
        - illustrativeOnly
      properties:
        fileName:
          type: string
          example: offer-cover.png
        contentType:
          type: string
          example: image/png
        imageBase64:
          type: string
          example: iVBORw0KGgoAAAANSUhEUgAA...
        illustrativeOnly:
          type: boolean
          example: true

    OfferImageUploadRequest:
      type: object
      required:
        - businessId
        - fileName
        - contentType
        - imageBase64
      properties:
        businessId:
          type: integer
          format: int64
          minimum: 1
        fileName:
          type: string
          maxLength: 255
        contentType:
          type: string
          maxLength: 100
        imageBase64:
          type: string
          minLength: 1
        illustrativeImage:
          type: boolean
          default: false

    OfferImageUploadResponse:
      type: object
      required:
        - imageId
        - imageUrl
        - contentType
        - illustrativeImage
      properties:
        imageId:
          type: string
          example: 8d57f0e4f5a94522a91d6a5d51ed3cdb.png
        imageUrl:
          type: string
          example: /offer-images/8d57f0e4f5a94522a91d6a5d51ed3cdb.png
        contentType:
          type: string
          example: image/png
        illustrativeImage:
          type: boolean
          example: false

    OrderStatus:
      type: string
      enum:
        - ACTIVE
        - CANCELLED
        - PICKED_UP
        - NO_SHOW

    NotificationType:
      type: string
      enum:
        - BUSINESS_STATUS_CHANGED
        - OFFER_PUBLISHED
        - OFFER_RESERVED
        - OFFER_CANCELLED
        - RESERVATION_STATUS_CHANGED
        - SYSTEM
